name: Rollback — Production

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "v1.0.0"
        required: true
        type: string
      reason:
        description: ""
        required: false
        type: string
        default: "Manual rollback"

jobs:
  rollback:
    name: Rollback to ${{ github.event.inputs.image_tag }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    env:
      RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
      APP_URL: ${{ secrets.APP_URL }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Log rollback intent
        run: |
          set -euo pipefail
          echo "🔁 Rollback initiated"
          echo "Target tag : ${{ github.event.inputs.image_tag }}"
          echo "Reason     : ${{ github.event.inputs.reason }}"
          echo "Triggered by: ${{ github.actor }}"

      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify image exists on GHCR
        run: |
          set -euo pipefail
          IMAGE="ghcr.io/${GITHUB_REPOSITORY,,}:${{ github.event.inputs.image_tag }}"
          echo "Checking image: $IMAGE"
          docker manifest inspect "$IMAGE" || {
            echo "❌ Image $IMAGE not found on GHCR"
            exit 1
          }

      - name: Pull rollback image
        run: |
          set -euo pipefail
          IMAGE="ghcr.io/${GITHUB_REPOSITORY,,}:${{ github.event.inputs.image_tag }}"
          docker pull "$IMAGE"
          echo "✅ Image pulled: $IMAGE"

      - name: Trigger Render redeploy
        if: env.RENDER_DEPLOY_HOOK != ''
        run: |
          set -euo pipefail
          curl -fsSL -X POST "$RENDER_DEPLOY_HOOK"
          echo "✅ Render redeploy triggered"

      - name: Health check post-rollback (backoff x15)
        if: env.APP_URL != ''
        run: |
          set -euo pipefail
          url="${APP_URL%/}/health"
          echo "Health check: $url"
          for i in $(seq 1 15); do
            if curl -fsS "$url" > /dev/null; then
              echo "✅ Rollback health check OK on attempt $i"
              exit 0
            fi
            sleep_seconds=$((2**i))
            [ "$sleep_seconds" -gt 60 ] && sleep_seconds=60
            sleep "${sleep_seconds}"
          done
          echo "❌ Health check failed after rollback"
          exit 1

      - name: Notify Discord — Rollback result
        if: always()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          set -euo pipefail
          if [ -z "$DISCORD_WEBHOOK" ]; then exit 0; fi
          if [ "${{ job.status }}" = "success" ]; then
            COLOR=3066993
            TITLE="✅ Rollback succeeded → ${{ github.event.inputs.image_tag }}"
          else
            COLOR=15158332
            TITLE="❌ Rollback FAILED → ${{ github.event.inputs.image_tag }}"
          fi
          curl -s -X POST "$DISCORD_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"$TITLE\",
                \"color\": $COLOR,
                \"fields\": [
                  {\"name\": \"Tag\", \"value\": \"${{ github.event.inputs.image_tag }}\", \"inline\": true},
                  {\"name\": \"Reason\", \"value\": \"${{ github.event.inputs.reason }}\", \"inline\": true},
                  {\"name\": \"Triggered by\", \"value\": \"${{ github.actor }}\", \"inline\": true}
                ],
                \"url\": \"https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
              }]
            }"

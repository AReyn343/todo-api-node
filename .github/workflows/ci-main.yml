name: CI — Production (main)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-main-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint + Tests + Coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 20
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Build Docker image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
         context: .
         push: false
         load: false
      - run: npm run lint
      - run: npm run test:coverage
      - uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  sonarcloud:
    name: SonarCloud Quality Gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: [quality]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 20
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run test:coverage
      - uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 20
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm audit --audit-level=high --omit=dev
      - uses: aquasecurity/trivy-action@e368e328979b113139d6f9068e03accaed98a518
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

  contract-testing:
    name: API Contract Testing
    runs-on: ubuntu-latest
    needs: [quality]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 20
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Start API server
        run: node app.js &
        env:
          PORT: 3000
          NODE_ENV: test
      - name: Wait for server
        run: npx wait-on http://localhost:3000/health --timeout 15000
      - name: Export OpenAPI spec
        run: curl -s http://localhost:3000/openapi.json -o openapi.json
      - name: Validate OpenAPI spec with Redocly
        run: |
          npx @redocly/cli lint openapi.json \
            --skip-rule=no-server-example.com \
            --skip-rule=operation-operationId \
            --skip-rule=operation-summary \
            --skip-rule=info-contact \
            --skip-rule=tag-description || true

  docker:
    name: Build Docker + Trivy Image Scan + Push GHCR
    runs-on: ubuntu-latest
    needs: [quality, security]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Compute image tags
        id: meta
        run: |
          set -euo pipefail
          IMAGE="ghcr.io/${GITHUB_REPOSITORY,,}"
          echo "tag_sha=$IMAGE:${GITHUB_SHA}" >> $GITHUB_OUTPUT
          echo "tag_latest=$IMAGE:latest" >> $GITHUB_OUTPUT
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f
      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: .
          push: false
          load: true
          tags: |
            ${{ steps.meta.outputs.tag_sha }}
            ${{ steps.meta.outputs.tag_latest }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - uses: aquasecurity/trivy-action@e368e328979b113139d6f9068e03accaed98a518
        with:
          scan-type: image
          image-ref: ${{ steps.meta.outputs.tag_sha }}
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
          skip-dirs: /usr/local/lib/node_modules/npm,/opt/yarn-v1.22.22
      - uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push Docker images to GHCR
        run: |
          set -euo pipefail
          docker push "${{ steps.meta.outputs.tag_sha }}"
          docker push "${{ steps.meta.outputs.tag_latest }}"

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: [docker]
    env:
      RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
      APP_URL: ${{ secrets.APP_URL }}
    steps:
      - name: Trigger Render production deploy
        if: env.RENDER_DEPLOY_HOOK != ''
        run: |
          set -euo pipefail
          curl -fsSL -X POST "$RENDER_DEPLOY_HOOK"
      - name: Health check production (backoff x15)
        if: env.APP_URL != ''
        run: |
          set -euo pipefail
          url="${APP_URL%/}/health"
          echo "Health check production: $url"
          for i in $(seq 1 15); do
            if curl -fsS "$url" > /dev/null; then
              echo "Production OK on attempt $i"
              exit 0
            fi
            sleep_seconds=$((2**i))
            [ "$sleep_seconds" -gt 60 ] && sleep_seconds=60
            sleep "${sleep_seconds}"
          done
          echo "Production health check failed"
          exit 1

  smoke-tests:
    name: Smoke Tests post-deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: [deploy-production]
    if: ${{ always() && needs.deploy-production.result == 'success' }}
    env:
      APP_URL: ${{ secrets.APP_URL }}
    steps:
      - name: Smoke test — GET /health
        if: env.APP_URL != ''
        run: |
          set -euo pipefail
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${APP_URL}/health")
          echo "GET /health → $STATUS"
          [ "$STATUS" = "200" ] || exit 1
      - name: Smoke test — GET /todos
        if: env.APP_URL != ''
        run: |
          set -euo pipefail
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${APP_URL}/todos")
          echo "GET /todos → $STATUS"
          [ "$STATUS" = "200" ] || exit 1
      - name: Smoke test — POST /todos
        if: env.APP_URL != ''
        run: |
          set -euo pipefail
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${APP_URL}/todos" \
            -H "Content-Type: application/json" \
            -d '{"title":"smoke-test","status":"pending"}')
          echo "POST /todos → $STATUS"
          [ "$STATUS" = "201" ] || exit 1
      - name: Smoke test — GET /docs
        if: env.APP_URL != ''
        run: |
          set -euo pipefail
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${APP_URL}/docs")
          echo "GET /docs → $STATUS"
          [ "$STATUS" = "200" ] || exit 1

  notify-discord:
    name: Discord Notification
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: [smoke-tests]
    if: always()
    env:
      DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
    steps:
      - name: Notify Discord
        if: env.DISCORD_WEBHOOK != ''
        run: |
          set -euo pipefail
          STATUS="${{ needs.smoke-tests.result }}"
          if [ "$STATUS" = "success" ]; then
            COLOR=3066993
            TITLE="✅ Production deploy succeeded"
          else
            COLOR=15158332
            TITLE="❌ Production deploy failed"
          fi
          curl -s -X POST "$DISCORD_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"$TITLE\",
                \"color\": $COLOR,
                \"fields\": [
                  {\"name\": \"Repo\", \"value\": \"${{ github.repository }}\", \"inline\": true},
                  {\"name\": \"Branch\", \"value\": \"${{ github.ref_name }}\", \"inline\": true},
                  {\"name\": \"Author\", \"value\": \"${{ github.actor }}\", \"inline\": true}
                ],
                \"url\": \"https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
              }]
            }"
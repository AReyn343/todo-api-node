name: CI — Production (main)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-main-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint + Tests + Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run test:coverage
      - uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  sonarcloud:
    name: SonarCloud Quality Gate
    runs-on: ubuntu-latest
    needs: [quality]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:coverage
      - uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=high --omit=dev
      - uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

  docker:
    name: Build Docker + Trivy Image Scan + Push GHCR
    runs-on: ubuntu-latest
    needs: [quality, security]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Compute image tags
        id: meta
        run: |
          IMAGE="ghcr.io/${GITHUB_REPOSITORY,,}"
          echo "tag_sha=$IMAGE:${GITHUB_SHA}" >> $GITHUB_OUTPUT
          echo "tag_latest=$IMAGE:latest" >> $GITHUB_OUTPUT
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: |
            ${{ steps.meta.outputs.tag_sha }}
            ${{ steps.meta.outputs.tag_latest }}
      - uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: ${{ steps.meta.outputs.tag_sha }}
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
          skip-dirs: /usr/local/lib/node_modules/npm,/opt/yarn-v1.22.22
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push Docker images to GHCR
        run: |
          docker push "${{ steps.meta.outputs.tag_sha }}"
          docker push "${{ steps.meta.outputs.tag_latest }}"

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [docker]
    env:
      RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
      APP_URL: ${{ secrets.APP_URL }}
    steps:
      - name: Trigger Render production deploy
        if: env.RENDER_DEPLOY_HOOK != ''
        run: curl -fsSL -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
      - name: Health check production (backoff x15)
        if: env.APP_URL != ''
        run: |
          set -e
          url="${APP_URL%/}/health"
          echo "Health check production: $url"
          for i in $(seq 1 15); do
            if curl -fsS "$url" > /dev/null; then
              echo "Production OK on attempt $i"
              exit 0
            fi
            sleep_seconds=$((2**i))
            echo "Attempt $i failed. Retrying in ${sleep_seconds}s..."
            sleep "${sleep_seconds}"
          done
          echo "Production health check failed"
          exit 1

  smoke-tests:
    name: Smoke Tests post-deploy
    runs-on: ubuntu-latest
    needs: [deploy-production]
    if: ${{ always() && needs.deploy-production.result == 'success' }}
    env:
      APP_URL: ${{ secrets.APP_URL }}
    steps:
      - name: Smoke test — GET /health
        if: env.APP_URL != ''
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${APP_URL}/health")
          echo "GET /health → $STATUS"
          [ "$STATUS" = "200" ] || exit 1
      - name: Smoke test — GET /todos
        if: env.APP_URL != ''
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${APP_URL}/todos")
          echo "GET /todos → $STATUS"
          [ "$STATUS" = "200" ] || exit 1
      - name: Smoke test — POST /todos
        if: env.APP_URL != ''
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${APP_URL}/todos" \
            -H "Content-Type: application/json" \
            -d '{"title":"smoke-test","status":"pending"}')
          echo "POST /todos → $STATUS"
          [ "$STATUS" = "201" ] || exit 1
      - name: Smoke test — GET /docs
        if: env.APP_URL != ''
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${APP_URL}/docs")
          echo "GET /docs → $STATUS"
          [ "$STATUS" = "200" ] || exit 1

  notify-discord:
    name: Discord Notification
    runs-on: ubuntu-latest
    needs: [smoke-tests]
    if: always()
    env:
      DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
    steps:
      - name: Notify Discord
        if: env.DISCORD_WEBHOOK != ''
        run: |
          STATUS="${{ needs.smoke-tests.result }}"
          if [ "$STATUS" = "success" ]; then
            COLOR=3066993
            TITLE="✅ Production deploy succeeded"
          else
            COLOR=15158332
            TITLE="❌ Production deploy failed"
          fi
          curl -s -X POST "$DISCORD_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"$TITLE\",
                \"color\": $COLOR,
                \"fields\": [
                  {\"name\": \"Repo\", \"value\": \"${{ github.repository }}\", \"inline\": true},
                  {\"name\": \"Branch\", \"value\": \"${{ github.ref_name }}\", \"inline\": true},
                  {\"name\": \"Author\", \"value\": \"${{ github.actor }}\", \"inline\": true}
                ],
                \"url\": \"https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
              }]
            }"
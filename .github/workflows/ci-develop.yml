name: CI — Staging (develop)

on:
  push:
    branches: [develop]

concurrency:
  group: ci-develop-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint + Tests + Coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 20
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Build Docker image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: .
          push: false
          load: false
      - run: npm run lint
      - run: npm run test:coverage
      - uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 20
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm audit --audit-level=high --omit=dev
      - uses: aquasecurity/trivy-action@e368e328979b113139d6f9068e03accaed98a518
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

  docker:
    name: Build Docker + Trivy Image Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: [quality, security]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Compute image tags
        id: meta
        run: |
          set -euo pipefail
          IMAGE="ghcr.io/${GITHUB_REPOSITORY,,}"
          echo "tag_sha=$IMAGE:${GITHUB_SHA}" >> $GITHUB_OUTPUT
          echo "tag_latest=$IMAGE:latest" >> $GITHUB_OUTPUT
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd
      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: .
          push: false
          load: true
          tags: |
            ${{ steps.meta.outputs.tag_sha }}
            ${{ steps.meta.outputs.tag_latest }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - uses: aquasecurity/trivy-action@e368e328979b113139d6f9068e03accaed98a518
        with:
          scan-type: image
          image-ref: ${{ steps.meta.outputs.tag_sha }}
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
          skip-dirs: /usr/local/lib/node_modules/npm,/opt/yarn-v1.22.22

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: [docker]
    env:
      STAGING_DEPLOY_HOOK: ${{ secrets.STAGING_DEPLOY_HOOK }}
      STAGING_URL: ${{ secrets.STAGING_URL }}
    steps:
      - name: Trigger Render staging deploy
        if: env.STAGING_DEPLOY_HOOK != ''
        run: |
          set -euo pipefail
          curl -fsSL -X POST "$STAGING_DEPLOY_HOOK"
      - name: Health check staging (backoff x15)
        if: env.STAGING_URL != ''
        run: |
          set -euo pipefail
          url="${STAGING_URL%/}/health"
          echo "Health check staging: $url"
          for i in $(seq 1 15); do
            if curl -fsS "$url" > /dev/null; then
              echo "Staging OK on attempt $i"
              exit 0
            fi
          sleep_seconds=$((2**i))
          [ "$sleep_seconds" -gt 60 ] && sleep_seconds=60
          sleep "$sleep_seconds"
          done
          echo "Staging health check failed"
          exit 1

  smoke-tests:
    name: Smoke Tests post-deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: [deploy-staging]
    if: ${{ always() && needs.deploy-staging.result == 'success' }}
    env:
      STAGING_URL: ${{ secrets.STAGING_URL }}
    steps:
      - name: Smoke test — GET /health
        if: env.STAGING_URL != ''
        run: |
          set -euo pipefail
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${STAGING_URL}/health")
          echo "GET /health → $STATUS"
          [ "$STATUS" = "200" ] || exit 1
      - name: Smoke test — GET /todos
        if: env.STAGING_URL != ''
        run: |
          set -euo pipefail
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${STAGING_URL}/todos")
          echo "GET /todos → $STATUS"
          [ "$STATUS" = "200" ] || exit 1
      - name: Smoke test — POST /todos
        if: env.STAGING_URL != ''
        run: |
          set -euo pipefail
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${STAGING_URL}/todos" \
            -H "Content-Type: application/json" \
            -d '{"title":"smoke-test-staging","status":"pending"}')
          echo "POST /todos → $STATUS"
          [ "$STATUS" = "201" ] || exit 1

  notify-discord:
    name: Discord Notification
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: [smoke-tests]
    if: always()
    env:
      DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
    steps:
      - name: Notify Discord
        if: env.DISCORD_WEBHOOK != ''
        run: |
          set -euo pipefail
          STATUS="${{ needs.smoke-tests.result }}"
          if [ "$STATUS" = "success" ]; then
            COLOR=3066993
            TITLE="✅ Staging deploy succeeded"
          else
            COLOR=15158332
            TITLE="❌ Staging deploy failed"
          fi
          curl -s -X POST "$DISCORD_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"$TITLE\",
                \"color\": $COLOR,
                \"fields\": [
                  {\"name\": \"Repo\", \"value\": \"${{ github.repository }}\", \"inline\": true},
                  {\"name\": \"Branch\", \"value\": \"${{ github.ref_name }}\", \"inline\": true},
                  {\"name\": \"Author\", \"value\": \"${{ github.actor }}\", \"inline\": true}
                ],
                \"url\": \"https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
              }]
            }"
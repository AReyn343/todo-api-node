name: CI

on:
  push:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint + Tests + Coverage (+Codecov)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Tests + Coverage
        run: npm run test:coverage

      - name: Upload coverage to Codecov (non-blocking)
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  sonarcloud:
    name: SonarCloud Quality Gate
    runs-on: ubuntu-latest
    needs: [quality]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:coverage
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  security:
    name: Security Scan (blocking)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: npm audit (HIGH+)
        run: npm audit --audit-level=high --omit=dev

      - name: Trivy filesystem scan (HIGH,CRITICAL)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

  docker:
    name: Build Docker + Trivy Image Scan + Push GHCR
    runs-on: ubuntu-latest
    needs: [quality, security]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image tags (lowercase)
        id: meta
        run: |
          IMAGE="ghcr.io/${GITHUB_REPOSITORY,,}"
          echo "image=$IMAGE" >> $GITHUB_OUTPUT
          echo "tag_latest=$IMAGE:latest" >> $GITHUB_OUTPUT
          echo "tag_sha=$IMAGE:${GITHUB_SHA}" >> $GITHUB_OUTPUT

      - name: Build Docker image (local)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: |
            ${{ steps.meta.outputs.tag_latest }}
            ${{ steps.meta.outputs.tag_sha }}

      - name: Trivy image scan (HIGH,CRITICAL)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: ${{ steps.meta.outputs.tag_sha }}
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
          skip-dirs: /usr/local/lib/node_modules/npm,/opt/yarn-v1.22.22

      - name: Login to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Docker images to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker push "${{ steps.meta.outputs.tag_sha }}"
          docker push "${{ steps.meta.outputs.tag_latest }}"

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [docker]
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    env:
      STAGING_DEPLOY_HOOK: ${{ secrets.STAGING_DEPLOY_HOOK }}
      STAGING_URL: ${{ secrets.STAGING_URL }}
    steps:
      - name: Trigger Render staging deploy
        if: env.STAGING_DEPLOY_HOOK != ''
        run: |
          curl -fsSL -X POST "${{ secrets.STAGING_DEPLOY_HOOK }}"

      - name: Health check staging (backoff x10)
        if: env.STAGING_URL != ''
        run: |
          set -e
          url="${STAGING_URL%/}/health"
          echo "Health check staging: $url"
          for i in $(seq 1 10); do
            if curl -fsS "$url" > /dev/null; then
              echo "Staging OK on attempt $i"
              exit 0
            fi
            sleep_seconds=$((2**i))
            echo "Attempt $i failed. Retrying in ${sleep_seconds}s..."
            sleep "${sleep_seconds}"
          done
          echo "Staging health check failed"
          exit 1

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [docker]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
      APP_URL: ${{ secrets.APP_URL }}
    steps:
      - name: Trigger Render production deploy
        if: env.RENDER_DEPLOY_HOOK != ''
        run: |
          curl -fsSL -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"

      - name: Health check production (backoff x10)
        if: env.APP_URL != ''
        run: |
          set -e
          url="${APP_URL%/}/health"
          echo "Health check production: $url"
          for i in $(seq 1 10); do
            if curl -fsS "$url" > /dev/null; then
              echo "Production OK on attempt $i"
              exit 0
            fi
            sleep_seconds=$((2**i))
            echo "Attempt $i failed. Retrying in ${sleep_seconds}s..."
            sleep "${sleep_seconds}"
          done
          echo "Production health check failed"
          exit 1